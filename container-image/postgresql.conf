# FlowHelm per-user PostgreSQL configuration.
#
# Tuned for a single-user orchestrator: low connection count,
# moderate shared buffers, aggressive autovacuum for the queue table.
# Disables JIT (not needed at our scale, saves RAM).

# ─── Connection ───────────────────────────────────────────────
listen_addresses = '*'
max_connections = 10
port = 5432

# ─── Memory ───────────────────────────────────────────────────
shared_buffers = 64MB
work_mem = 4MB
maintenance_work_mem = 32MB
effective_cache_size = 128MB

# ─── JIT (disabled — saves ~30 MB RAM, not useful at our scale)
jit = off

# ─── WAL ──────────────────────────────────────────────────────
wal_level = replica
max_wal_size = 256MB
min_wal_size = 32MB

# ─── Autovacuum (aggressive for queue table churn) ────────────
autovacuum = on
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ─── Logging ──────────────────────────────────────────────────
log_min_messages = warning
log_min_error_statement = error
log_timezone = 'UTC'

# ─── Locale ───────────────────────────────────────────────────
timezone = 'UTC'
datestyle = 'iso, mdy'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
